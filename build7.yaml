---
# 7-column (3rd keyboard) builds — same hardware as corne6, separate BT name
# Uses config/corne7.keymap, copied to corne.keymap before build
include:
  - board: nice_nano_v2
    shield: corne_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: corne7_left_studio
  - board: nice_nano_v2
    shield: corne_right
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: corne7_right_studio
