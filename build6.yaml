---
# 6-column Corne builds (uses config/corne6.keymap, copied to corne.keymap before build)
include:
  - board: nice_nano_v2
    shield: corne_left
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: corne6_left_studio
  - board: nice_nano_v2
    shield: corne_right
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: corne6_right_studio
