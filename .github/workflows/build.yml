on: [push, pull_request, workflow_dispatch]

jobs:
  # 5-column Corne — uses config/corne.keymap via ZMK's reusable workflow
  build-5col:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3.0

  # 6-column Corne — copies corne6.keymap → corne.keymap, then builds
  build-6col:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:stable
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swap keymap for 6-col
        run: |
          cp config/corne.keymap config/corne.keymap.bak
          cp config/corne6.keymap config/corne.keymap

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            bootloader
            modules
            tools
            zephyr
            zmk
          key: ${{ runner.os }}-west-${{ hashFiles('config/west.yml') }}

      - name: Initialize west workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Build corne6 left
        run: |
          west build -s zmk/app -b nice_nano_v2 -- \
            -DSHIELD="corne_left" \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
            -DCONFIG_ZMK_STUDIO=y \
            -DSNIPPET="studio-rpc-usb-uart"
          cp build/zephyr/zmk.uf2 corne6_left_studio.uf2
          west build --pristine -s zmk/app -b nice_nano_v2 -- \
            -DSHIELD="corne_right" \
            -DZMK_CONFIG="${GITHUB_WORKSPACE}/config" \
            -DCONFIG_ZMK_STUDIO=y \
            -DSNIPPET="studio-rpc-usb-uart"
          cp build/zephyr/zmk.uf2 corne6_right_studio.uf2

      - name: Upload 6-col firmware
        uses: actions/upload-artifact@v4
        with:
          name: corne6-firmware
          path: |
            corne6_left_studio.uf2
            corne6_right_studio.uf2
